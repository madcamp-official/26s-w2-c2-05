name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-ai-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r ai_server/requirements.txt
      - run: python -m pytest ai_server/tests

  test-web-server:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-test-jwt-secret
      ENCRYPTION_KEY: vxiGQE5vvuc8w0VXgJrDhDa48CeVz8qGdXZmDgXNBR0=
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r web-server/requirements.txt
      - run: python -m pytest web-server/tests

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  deploy:
    needs: [test-ai-server, test-web-server, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd ~/week2
            git pull origin main

            source ai_server/.venv/bin/activate
            pip install -r ai_server/requirements.txt
            deactivate

            source web-server/.venv/bin/activate
            pip install -r web-server/requirements.txt
            deactivate

            cd frontend
            npm ci
            npm run build
            cd ..

            sudo systemctl restart ai-server web-server frontend
